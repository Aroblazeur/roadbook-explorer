name: Publish roadbook from Studio

on:
  workflow_dispatch:
    inputs:
      roadbook_id:
        description: Roadbook ID to create or update
        required: true
        type: string
      payload_encoding:
        description: Encoding used for payload_base64
        required: true
        default: gzip-base64
        type: choice
        options:
          - gzip-base64
          - json-base64
      payload_base64:
        description: Base64 publication payload generated by RoadBook Studio
        required: true
        type: string
      commit_message:
        description: Optional commit message
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-roadbook-${{ inputs.roadbook_id }}
  cancel-in-progress: false

jobs:
  publish:
    name: Write roadbook files and commit to main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Write roadbook files
        env:
          ROADBOOK_ID: ${{ inputs.roadbook_id }}
          PAYLOAD_ENCODING: ${{ inputs.payload_encoding }}
          PAYLOAD_BASE64: ${{ inputs.payload_base64 }}
        run: node scripts/publish-roadbook-from-workflow.js

      - name: Validate generated config syntax
        env:
          ROADBOOK_ID: ${{ inputs.roadbook_id }}
        run: node --check "roadbooks/${ROADBOOK_ID}/config.js"

      - name: Check whitespace
        run: git diff --check

      - name: Commit and push to main
        env:
          ROADBOOK_ID: ${{ inputs.roadbook_id }}
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "roadbooks/${ROADBOOK_ID}/roadbook.json" "roadbooks/${ROADBOOK_ID}/config.js" roadbooks/catalog.json
          if [ -d "roadbooks/${ROADBOOK_ID}/gpx" ]; then
            git add "roadbooks/${ROADBOOK_ID}/gpx/"
          fi
          if [ -d "roadbooks/${ROADBOOK_ID}/data" ]; then
            git add "roadbooks/${ROADBOOK_ID}/data/"
          fi

          if git diff --cached --quiet; then
            echo "No roadbook changes to publish."
            exit 0
          fi

          if [ -z "$COMMIT_MESSAGE" ]; then
            COMMIT_MESSAGE="chore: publish ${ROADBOOK_ID} roadbook"
          fi

          git commit -m "$COMMIT_MESSAGE"
          git push origin HEAD:main
